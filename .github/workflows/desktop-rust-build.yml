name: Desktop Rust Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'desktop-rust-v*'

permissions:
  contents: write

concurrency:
  group: desktop-rust-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macos
          - os: windows-latest
            label: windows

    env:
      CI: true
      CARGO_TERM_COLOR: always
      GITHUB_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            tauri-shell/src-tauri -> target

      - name: Install Tauri CLI
        shell: bash
        run: |
          if cargo tauri --version >/dev/null 2>&1; then
            cargo tauri --version
          else
            cargo install tauri-cli --version '^2' --locked
          fi

      - name: Install npm dependencies
        run: npm ci

      - name: Build desktop installers
        run: npm run desktop-rust-build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-rust-${{ matrix.label }}-bundle
          path: tauri-shell/src-tauri/target/release/bundle/**
          if-no-files-found: error
          retention-days: 14

      - name: Archive macOS app bundle
        if: startsWith(github.ref, 'refs/tags/') && matrix.label == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          app_path="$(find tauri-shell/src-tauri/target/release/bundle/macos -maxdepth 1 -type d -name '*.app' | head -n 1)"
          if [[ -z "${app_path}" ]]; then
            echo "No .app bundle found to archive"
            exit 1
          fi

          zip_path="${app_path}.zip"
          rm -f "${zip_path}"
          ditto -c -k --sequesterRsrc --keepParent "${app_path}" "${zip_path}"
          echo "Archived ${app_path} -> ${zip_path}"

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tauri-shell/src-tauri/target/release/bundle/**/*.dmg
            tauri-shell/src-tauri/target/release/bundle/**/*.app.zip
            tauri-shell/src-tauri/target/release/bundle/**/*.msi
            tauri-shell/src-tauri/target/release/bundle/**/*.exe
          fail_on_unmatched_files: false

      - name: Print artifact note
        shell: bash
        run: |
          echo "Artifacts were uploaded from tauri-shell/src-tauri/target/release/bundle/"
          echo "Release bundles now embed the standalone VS Code web assets for offline desktop use."
